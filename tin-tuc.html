<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<script>
    async function loadData() {
      try {
        const newsRes = await fetch('data/news.json');
        const newsData = await newsRes.json();

        // Tab Tin Tức
        let html = '';
        newsData.tin_tuc.forEach(item => {
          html += `
            <div class="col-md-6 mb-4">
              <div class="card h-100 shadow-sm">
                <div class="card-body">
                  <h5 class="card-title">${item.title}</h5>
                  <p class="card-text text-muted small">${item.date} • ${item.source}</p>
                  <p class="card-text">${item.summary}</p>
                  <a href="${item.link}" target="_blank" class="btn btn-primary btn-sm">Đọc tiếp →</a>
                </div>
              </div>
            </div>`;
        });
        document.getElementById('tin-tuc-content').innerHTML = html;

        // Tab Chính Sách & Luật
        html = '';
        newsData.chinh_sach.forEach(item => {
          html += `
            <div class="col-md-6 mb-4">
              <div class="card h-100 shadow-sm">
                <div class="card-body">
                  <h5 class="card-title">${item.title}</h5>
                  <p class="card-text text-muted small">${item.date}</p>
                  <p class="card-text">${item.summary}</p>
                  <a href="${item.link}" target="_blank" class="btn btn-primary btn-sm">Chi tiết →</a>
                </div>
              </div>
            </div>`;
        });
        document.getElementById('chinh-sach-content').innerHTML = html;

      } catch(e) {
        console.error(e);
        document.getElementById('tin-tuc-content').innerHTML = '<p class="text-danger">Lỗi tải tin tức. Vui lòng thử lại sau.</p>';
      }
    }

    async function renderCandlestick() {
      try {
        const res = await fetch('data/stocks.json');
        const data = await res.json();

        if (!data.candles || data.candles.length === 0) {
          document.getElementById('chart-container').innerHTML = '<p class="text-center text-warning">Chưa có dữ liệu biểu đồ.</p>';
          return;
        }

        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
          width: 900,
          height: 550,
          layout: { background: { color: '#f8f9fa' } }
        });

        const candleSeries = chart.addCandlestickSeries();
        candleSeries.setData(data.candles);
        chart.timeScale().fitContent();

        console.log("✅ Biểu đồ VN-Index đã render thành công");
      } catch(e) {
        console.error(e);
        document.getElementById('chart-container').innerHTML = '<p class="text-danger">Lỗi tải biểu đồ. Vui lòng thử lại.</p>';
      }
    }

    window.onload = () => {
      loadData();
      renderCandlestick();
    };
  </script>
