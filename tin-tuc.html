<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tin Tức & Phân Tích Thị Trường | tantoi-law-finance.store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .nav-tabs .nav-link { font-weight: 600; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-4px); }
    #chart-container { background: white; border-radius: 12px; padding: 10px; }
  </style>
</head>
<body>
  <div class="container py-4">
    <h2 class="text-center mb-4">📊 Tin Tức & Phân Tích Thị Trường</h2>

    <ul class="nav nav-tabs mb-4" id="myTab">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tin-tuc">📰 Tin Tức</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#chinh-sach">⚖️ Chính Sách & Luật</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#phan-tich">📈 Phân Tích VN30</button></li>
    </ul>

    <div class="tab-content">
      <!-- Tab Tin Tức -->
      <div class="tab-pane fade show active" id="tin-tuc">
        <div id="tin-tuc-content" class="row"></div>
        <small class="text-muted">Tự động cập nhật mỗi 30 phút</small>
      </div>

      <!-- Tab Chính Sách -->
      <div class="tab-pane fade" id="chinh-sach">
        <div id="chinh-sach-content" class="row"></div>
        <small class="text-muted">Tự động cập nhật mỗi 30 phút</small>
      </div>

      <!-- Tab Phân Tích VN30 -->
      <div class="tab-pane fade" id="phan-tich">
        <div class="mb-3">
          <label><strong>Chọn cổ phiếu VN30:</strong></label>
          <select id="stock-select" class="form-select" style="max-width: 280px;">
            <option value="VNINDEX">VNINDEX (Toàn thị trường)</option>
          </select>
          <small class="text-muted">Hiện tại chỉ hỗ trợ VNINDEX. Các mã khác sẽ cập nhật sau.</small>
        </div>
        <div id="chart-container" style="height: 620px; width: 100%;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <script>
    // ==================== TIN TỨC + CHÍNH SÁCH ====================
    async function loadNews() {
      try {
        const res = await fetch('data/news.json?' + Date.now());
        const data = await res.json();

        document.getElementById('tin-tuc-content').innerHTML = data.tin_tuc.map(item => `
          <div class="col-md-6 mb-3">
            <div class="card h-100">
              <div class="card-body">
                <h6>${item.title}</h6>
                <small class="text-muted">${item.date} • ${item.source}</small>
                <p class="small">${item.summary}</p>
                <a href="${item.link}" target="_blank" class="btn btn-sm btn-primary">Đọc tiếp</a>
              </div>
            </div>
          </div>
        `).join('');

        document.getElementById('chinh-sach-content').innerHTML = data.chinh_sach.map(item => `
          <div class="col-md-6 mb-3">
            <div class="card h-100">
              <div class="card-body">
                <h6>${item.title}</h6>
                <small class="text-muted">${item.date}</small>
                <p class="small">${item.summary}</p>
                <a href="${item.link}" target="_blank" class="btn btn-sm btn-primary">Chi tiết</a>
              </div>
            </div>
          </div>
        `).join('');
      } catch(e) { console.error(e); }
    }

    setInterval(loadNews, 30 * 60 * 1000);

    // ==================== BIỂU ĐỒ VN30 ====================
    let currentChart = null;

    async function renderChart() {
      if (currentChart) currentChart.remove();

      const container = document.getElementById('chart-container');
      container.innerHTML = '';

      try {
        const res = await fetch('data/stocks.json?' + Date.now());
        const data = await res.json();

        if (!data.candles || data.candles.length === 0) {
          container.innerHTML = '<p class="text-warning">Chưa có dữ liệu biểu đồ.</p>';
          return;
        }

        const chart = LightweightCharts.createChart(container, {
          width: container.clientWidth,
          height: 580,
          layout: { background: { color: '#fff' } }
        });

        const candleSeries = chart.addCandlestickSeries();
        candleSeries.setData(data.candles);

        // MA7
        const ma7 = chart.addLineSeries({ color: '#2962FF', lineWidth: 2, title: 'MA7' });
        const ma7Data = data.candles.map((c, i) => ({
          time: c.time,
          value: calculateMA(data.candles, i, 7)
        })).filter(d => d.value !== null);
        ma7.setData(ma7Data);

        currentChart = chart;

      } catch(e) {
        console.error(e);
        container.innerHTML = '<p class="text-danger">Lỗi tải biểu đồ. Vui lòng thử lại sau.</p>';
      }
    }

    function calculateMA(candles, index, period) {
      if (index < period - 1) return null;
      let sum = 0;
      for (let i = 0; i < period; i++) sum += candles[index - i].close;
      return sum / period;
    }

    // Khởi chạy
    window.onload = () => {
      loadNews();
      renderChart();
    };
  </script>
</body>
</html>
