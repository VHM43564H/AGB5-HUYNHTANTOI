<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tin Tức - Tài Chính & Luật | tantoi-law-finance.store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .nav-tabs .nav-link { font-weight: 600; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    #chart-container { border: 1px solid #ddd; background: #fff; }
  </style>
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="text-center mb-4">📢 Tin Tức Tài Chính & Luật</h1>
    
    <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tin-tuc">📰 Tin Tức</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#chinh-sach">⚖️ Chính Sách & Luật</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#phan-tich">📈 Phân Tích Thị Trường</button></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="tin-tuc"><div id="tin-tuc-content" class="row"></div></div>
      <div class="tab-pane fade" id="chinh-sach"><div id="chinh-sach-content" class="row"></div></div>
      <div class="tab-pane fade" id="phan-tich">
        <div id="chart-container" style="height: 600px;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Dùng phiên bản 4.1.3 ổn định (chưa update v5) -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    console.log("🚀 Tin-tuc.html v3 - Lightweight Charts v4 loaded");

    let chart = null;

    async function loadNews() {
      try {
        const res = await fetch('/data/news.json');
        const data = await res.json();

        document.getElementById('tin-tuc-content').innerHTML = data.tin_tuc.map(item => `
          <div class="col-md-6 mb-4">
            <div class="card h-100">
              <div class="card-body">
                <h5 class="card-title">${item.title}</h5>
                <p class="text-muted small">${item.date} • ${item.source}</p>
                <p class="card-text">${item.summary}</p>
                <a href="${item.link}" target="_blank" class="btn btn-primary btn-sm">Đọc tiếp →</a>
              </div>
            </div>
          </div>
        `).join('');

        document.getElementById('chinh-sach-content').innerHTML = data.chinh_sach.map(item => `
          <div class="col-md-6 mb-4">
            <div class="card h-100">
              <div class="card-body">
                <h5 class="card-title">${item.title}</h5>
                <p class="text-muted small">${item.date}</p>
                <p class="card-text">${item.summary}</p>
                <a href="${item.link}" target="_blank" class="btn btn-primary btn-sm">Chi tiết →</a>
              </div>
            </div>
          </div>
        `).join('');

      } catch (e) {
        console.error("❌ Lỗi tin tức:", e);
      }
    }

    function createCandlestickChart() {
      const container = document.getElementById('chart-container');
      if (chart) chart.remove();

      chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: 600,
        layout: { background: { color: '#ffffff' } },
        grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } }
      });

      const candleSeries = chart.addCandlestickSeries();

      fetch('/data/stocks.json')
        .then(res => res.json())
        .then(data => {
          candleSeries.setData(data.candles);
          chart.timeScale().fitContent();
          console.log("✅ Biểu đồ nến VNINDEX đã vẽ xong!");
        })
        .catch(err => {
          console.error("❌ Lỗi load stocks.json:", err);
          container.innerHTML = `<p class="text-danger p-3">Không tải được dữ liệu biểu đồ. Vui lòng thử lại sau.</p>`;
        });
    }

    document.addEventListener('DOMContentLoaded', loadNews);

    // Chỉ vẽ biểu đồ khi click tab Phân Tích
    document.querySelector('button[data-bs-target="#phan-tich"]').addEventListener('shown.bs.tab', createCandlestickChart);

    // Resize khi thay đổi cửa sổ
    window.addEventListener('resize', () => {
      if (chart) chart.resize(document.getElementById('chart-container').clientWidth, 600);
    });
  </script>
</body>
</html>
