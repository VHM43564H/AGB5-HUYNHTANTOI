name: Cập nhật Tin Tức & Biểu Đồ (mỗi 30 phút)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài thư viện
        run: |
          pip install feedparser vnstock requests

      - name: Chạy fetch tin tức
        run: python scripts/fetch_news.py

      - name: Chạy fetch biểu đồ VN30
        run: python scripts/fetch_charts.py

      - name: Chạy fetch Kinh tế Vĩ mô
        run: python scripts/fetch_macro.py

      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit_message: "🔄 Auto update: Tin tức + VN30 + Kinh tế Vĩ mô"