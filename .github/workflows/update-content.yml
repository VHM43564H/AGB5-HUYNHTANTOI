name: Cập nhật Tin Tức & Biểu Đồ (mỗi 30 phút)

on:
  schedule:
    - cron: '*/30 * * * *'   # Chạy mỗi 30 phút
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cài thư viện
        run: |
          pip install feedparser vnstock requests

      - name: Chạy fetch tin tức
        run: python scripts/fetch_news.py

      - name: Chạy fetch biểu đồ VN30 + cổ phiếu
        run: python scripts/fetch_charts.py

      - name: Chạy fetch Kinh tế Vĩ mô (World Bank)
        run: python scripts/fetch_macro.py

      - name: Commit & Push thay đổi
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto update: Tin tức + VN30 + Kinh tế Vĩ mô"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}